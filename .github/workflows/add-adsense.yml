name: Add AdSense to all HTML files

on:
  workflow_dispatch:

jobs:
  add-adsense:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run AdSense script
        run: node add-adsense.js
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.html
          git commit -m "Add AdSense code to all HTML files" || echo "Nothing to commit"
          git push
