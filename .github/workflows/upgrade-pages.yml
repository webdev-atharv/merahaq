name: Upgrade All MeraHaq HTML Pages - APEX LEVEL

on:
  workflow_dispatch:
  push:
    paths:
      - '**.html'

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write upgrade script
        run: |
          echo "" | base64 -d > upgrade_script.js

      - name: Upgrade all HTML pages
        run: node upgrade_script.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MeraHaq Upgrade Bot"
          git add -A
          git diff --staged --quiet || git commit -m "APEX Upgrade: 1000+ words/page, 3 AdSense slots, rich schema, full SEO [$(date '+%Y-%m-%d %H:%M')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
