name: MeraHaq - High Quality Content Generator

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write content generator
        run: echo "" | base64 -d > content_generator.js

      - name: Generate high quality pages
        run: node content_generator.js

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MeraHaq Content Bot"
          git add -A
          git diff --staged --quiet || git commit -m "High quality content: 1500+ words, real data, AdSense-ready pages"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
