name: Fix Blog RTI and Footer Issues

on:
  workflow_dispatch:

jobs:
  fix-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Run fix script
        run: python fix_issues.py

      - name: Commit and push
        run: |
          git config user.name "content-bot"
          git config user.email "bot@merahaq.online"
          git add -A
          git diff --staged --quiet || git commit -m "Fix: blog.html, rti-guide.html proper content + rich content moved above footer"
          git push
