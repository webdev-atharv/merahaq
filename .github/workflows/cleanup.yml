name: Cleanup Auto-Generated Files

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete auto-generated HTML files
        run: |
          git log --name-only --pretty=format: --grep="Auto-generated pages" | \
          grep "\.html$" | sort -u | xargs -r rm -f

      - name: Delete scripts folder
        run: rm -rf scripts/

      - name: Delete generator workflow
        run: |
          ls .github/workflows/
          rm -f .github/workflows/generate*.yml
          rm -f .github/workflows/auto*.yml

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Remove auto-generated files and scripts"
          git push
