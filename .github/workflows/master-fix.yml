name: Master Fix All Pages

on:
  workflow_dispatch:

jobs:
  master-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Run master fix script
        run: python master_fix.py

      - name: Commit and push
        run: |
          git config user.name "content-bot"
          git config user.email "bot@merahaq.online"
          git add -A
          git diff --staged --quiet || git commit -m "Master fix: nav, footer, copyright, meta, rich content position on ALL pages"
          git push
