name: Fix Mobile Layout

on:
  workflow_dispatch

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Run mobile fix script
        run: node fix_all_pages.js

      - name: Commit and push changes
        run: |
          git config user.email "bot@merahaq.online"
          git config user.name "merahaq-fix-bot"
          git add -A
          git commit -m "Fix: mobile layout, ad slots, line-height all pages"
          git push
