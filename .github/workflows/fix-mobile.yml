name: Fix Mobile - MeraHaq All Pages

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write fix script
        run: echo "" | base64 -d > fix_all_pages.js

      - name: Run fix script
        run: node fix_all_pages.js

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MeraHaq Fix Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Mobile fix: responsive CSS injected into all pages"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
