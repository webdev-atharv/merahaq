name: MeraHaq — Auto Redirect & Vercel Validator

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate vercel.json & Check Redirects

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate vercel.json
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  MeraHaq vercel.json Validator"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ ! -f vercel.json ]; then
            echo "❌ ERROR: vercel.json not found!"
            exit 1
          fi
          if ! python3 -c "import json; json.load(open('vercel.json'))" 2>/dev/null; then
            echo "❌ ERROR: vercel.json has invalid JSON syntax!"
            exit 1
          fi
          echo "✅ vercel.json is valid JSON"
          CLEAN=$(python3 -c "import json; d=json.load(open('vercel.json')); print(d.get('cleanUrls','missing'))")
          if [ "$CLEAN" != "True" ]; then
            echo "❌ ERROR: cleanUrls must be true! Found: $CLEAN"
            exit 1
          fi
          echo "✅ cleanUrls: true — confirmed"
          TRAILING=$(python3 -c "import json; d=json.load(open('vercel.json')); print(d.get('trailingSlash','missing'))")
          if [ "$TRAILING" != "False" ]; then
            echo "❌ ERROR: trailingSlash must be false! Found: $TRAILING"
            exit 1
          fi
          echo "✅ trailingSlash: false — confirmed"

      - name: Check for .html redirect loops
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Checking for .html redirect loops"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          python3 << 'PYEOF'
          import json, sys
          with open('vercel.json') as f:
            config = json.load(f)
          redirects = config.get('redirects', [])
          errors = []
          for r in redirects:
            src = r.get('source', '')
            dst = r.get('destination', '')
            if '.html' in src:
              errors.append(f"❌ .html in source: {src} — Remove .html")
            if '.html' in dst:
              errors.append(f"❌ .html in destination: {dst} — Remove .html")
            if src == dst:
              errors.append(f"❌ Redirect loop: {src} → {dst}")
          if errors:
            for e in errors:
              print(e)
            sys.exit(1)
          else:
            print(f"✅ All {len(redirects)} redirect rule(s) are clean")
          PYEOF

      - name: Check redirect destinations exist
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Checking page inventory"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          python3 << 'PYEOF'
          import json, os, sys
          html_files = [f for f in os.listdir('.') if f.endswith('.html') and f != 'index.html']
          html_slugs = set(f.replace('.html', '') for f in html_files)
          with open('vercel.json') as f:
            config = json.load(f)
          redirects = config.get('redirects', [])
          errors = []
          for r in redirects:
            dst = r.get('destination', '').lstrip('/')
            if dst and dst not in html_slugs and dst != 'index':
              errors.append(f"❌ Redirect → /{dst} has no matching {dst}.html file!")
          print(f"📄 Total HTML pages: {len(html_files)}")
          print(f"🔀 Total redirect rules: {len(redirects)}")
          if errors:
            for e in errors:
              print(e)
            sys.exit(1)
          else:
            print("✅ All redirect destinations exist")
          PYEOF

      - name: Scan for duplicate pages
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Scanning for duplicate slugs"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          python3 << 'PYEOF'
          import os
          html_files = sorted([f for f in os.listdir('.') if f.endswith('.html')])
          slugs = [f.replace('.html','') for f in html_files]
          duplicate_pairs = [
            ('national-pension-scheme', 'atal-pension-yojana'),
            ('jan-dhan-account-benefits', 'jan-dhan-yojana'),
            ('pradhan-mantri-fasal-bima', 'fasal-bima-yojana'),
            ('pmay-housing-scheme-apply', 'pmay'),
            ('pm-ujjwala-yojana-2', 'ujjwala-yojana'),
          ]
          warnings = []
          for old, new in duplicate_pairs:
            if old in slugs and new in slugs:
              warnings.append(f"⚠️  Duplicate: /{old} and /{new} — add redirect rule")
          print(f"📄 {len(html_files)} HTML files scanned")
          if warnings:
            for w in warnings:
              print(w)
          else:
            print("✅ No duplicate page patterns detected")
          PYEOF

      - name: Final summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ ALL CHECKS PASSED — Safe to deploy"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  vercel.json is valid"
          echo "  No .html redirect loops"
          echo "  All redirect destinations exist"
          echo "  Vercel will deploy this safely"
