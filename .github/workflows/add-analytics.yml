name: Add Google Analytics

on:
  workflow_dispatch:

jobs:
  add-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Add GA to all HTML files
        run: |
          GA_CODE='<script async src="https://www.googletagmanager.com/gtag/js?id=G-KE845KJ8TC"></script>\n<script>\nwindow.dataLayer = window.dataLayer || [];\nfunction gtag(){dataLayer.push(arguments);}\ngtag("js", new Date());\ngtag("config", "G-KE845KJ8TC");\n</script>'

          for file in *.html; do
            if grep -q "G-KE845KJ8TC" "$file"; then
              echo "Skipped (already has GA): $file"
            elif grep -q "</head>" "$file"; then
              sed -i "s|</head>|${GA_CODE}\n</head>|" "$file"
              echo "Updated: $file"
            else
              echo "No </head> found: $file"
            fi
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.html
          git diff --staged --quiet || git commit -m "Add Google Analytics to all HTML pages"
          git push
