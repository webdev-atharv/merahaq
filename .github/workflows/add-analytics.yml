name: Add Google Analytics

on:
  workflow_dispatch:

jobs:
  add-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add GA to all HTML files
        run: |
          for file in *.html; do
            if grep -q "G-KE845KJ8TC" "$file"; then
              echo "Skipped: $file"
            elif grep -q "</head>" "$file"; then
              python3 -c "
import sys
content = open('$file').read()
tag = '<script async src=\"https://www.googletagmanager.com/gtag/js?id=G-KE845KJ8TC\"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag(\"js\",new Date());gtag(\"config\",\"G-KE845KJ8TC\");</script>'
content = content.replace('</head>', tag + '</head>', 1)
open('$file', 'w').write(content)
"
              echo "Updated: $file"
            fi
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.html
          git diff --staged --quiet || git commit -m "Add Google Analytics to all HTML pages"
          git push
