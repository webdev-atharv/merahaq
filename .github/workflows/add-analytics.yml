name: Add Google Analytics

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Inject Analytics into HTML
        run: |
          find . -name "*.html" | xargs sed -i 's|</head>|<script async src="https://www.googletagmanager.com/gtag/js?id=G-KE845KJ8TC"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag("js",new Date());gtag("config","G-KE845KJ8TC");</script></head>|g'

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Add Google Analytics"
          git push
