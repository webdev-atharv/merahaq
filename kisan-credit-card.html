    <script type="application/ld+json">
    {

      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is the Kisan Credit Card (KCC) scheme?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Kisan Credit Card (KCC) scheme is a government initiative in India that provides farmers with timely and adequate credit support from the banking system for their cultivation needs, post-harvest expenses, consumption requirements, and working capital for allied activities. It aims to provide flexible and simplified procedures for availing agricultural credit."
          }
        },
        {
          "@type": "Question",
          "name": "What is the interest rate for KCC loans?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The base interest rate for KCC loans is typically 7% per annum. However, the government provides an interest subvention of 2% per annum. Additionally, an extra 3% interest subvention is given to farmers who repay their loans promptly, bringing the effective interest rate down to 4% per annum for such farmers."
          }
        },
        {
          "@type": "Question",
          "name": "What is the maximum credit limit under KCC?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The maximum credit limit under KCC can vary based on the scale of finance, cropping pattern, and activities undertaken by the farmer. For collateral-free loans, the limit is generally up to ₹3 Lakh. Loans beyond this amount may require collateral."
          }
        },
        {
          "@type": "Question",
          "name": "Who is eligible to apply for a Kisan Credit Card?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "All farmers—individual/joint cultivators, tenant farmers, oral lessees, and sharecroppers are eligible. Self Help Groups (SHGs) or Joint Liability Groups (JLGs) of farmers, including tenant farmers, sharecroppers, etc., are also eligible. The scheme also covers fishermen and dairy farmers for their working capital needs."
          }
        },
        {
          "@type": "Question",
          "name": "How can I apply for a Kisan Credit Card?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can apply for a KCC by visiting your nearest bank branch (Public Sector Banks, Private Sector Banks, Regional Rural Banks, Cooperative Banks) or by downloading the application form from official bank websites or the MyScheme portal. Fill out the form, attach required documents (identity proof, address proof, land documents), and submit it to the bank. The bank will then verify your details and process your application."
          }
        },
        {
          "@type": "Question",
          "name": "What documents are required to apply for KCC?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Key documents include a duly filled KCC application form, identity proof (Aadhaar Card, PAN Card, Voter ID, Driving License), address proof (Aadhaar Card, utility bills), land documents (Patta, Khasra, Jamabandi), a passport-size photograph, and an affidavit stating no existing KCC or loans from other banks."
          }
        },
        {
          "@type": "Question",
          "name": "Is collateral required for a Kisan Credit Card?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For KCC loans up to ₹1.60 Lakh, no collateral is typically required. For loans exceeding ₹1.60 Lakh and up to ₹3 Lakh, collateral security may be waived based on the bank's discretion and the farmer's credit history. Beyond ₹3 Lakh, collateral security is usually required."
          }
        }
